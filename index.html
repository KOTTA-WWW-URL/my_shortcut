    body {

      background: #f5f5f5;
      margin: 0;
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: white;
      padding: 20px;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      color: black;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

</html>
