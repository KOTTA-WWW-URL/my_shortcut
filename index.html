<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Shortcut</title>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Solve.js"></script>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      max-width: 800px;
      margin: 0 auto 40px auto;
    }

    .card {
      background: white;
      padding: 20px;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      color: black;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* --- 計算機のスタイル --- */
    .calc-container {
      max-width: 340px;
      margin: 0 auto;
      background: #2d3142;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .calc-display {
      width: 100%;
      height: 60px;
      background: #4f5d75;
      color: #ffffff;
      text-align: right;
      font-size: 1.8rem;
      border: none;
      border-radius: 10px;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 15px;
    }

    .calc-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .calc-btn {
      background: #bfc0c0;
      color: #2d3142;
      border: none;
      padding: 15px 0;
      font-size: 1.4rem;
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, transform 0.05s;
    }

    .calc-btn:active {
      transform: scale(0.95);
      filter: brightness(0.9);
    }

    /* 数字ボタン */
    .calc-btn.num {
      background: #ffffff;
      color: #2d3142;
    }

    /* クリアボタン */
    .calc-btn.clear {
      background: #d90429;
      color: white;
    }

    /* 計算実行ボタン */
    .calc-btn.exec {
      background: #ef8354;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>shortcut</h1>

  <div class="grid">
    <a class="card" href="https://paiza.jp/coupon/complete" target="_blank">paiza</a>
    <a class="card" href="https://kali-n-coder.github.io/company/" target="_blank">Work</a>
    <a class="card" href="https://chatgpt.com/" target="_blank">Chatgpt</a>
    <a class="card" href="https://spike.legoeducation.com/prime/lobby/" target="_blank">LEGO SPIKE</a>
    <a class="card" href="https://classroom.google.com/c/NzcxOTg4MjEzMjE1" target="_blank">歴史_classroom</a>
    <a class="card" href="https://classi-sso.classinote.com/lessons/taking" target="_blank">ClassiNOTE</a>
    <a class="card" href="https://kotta-www-url.github.io/supercheckk/" target="_blank">Supercheck</a>
    <a class="card" href="https://mail.google.com/mail/u/0/#chat/space/AAQAfQ8XCgw" target="_blank">Memo</a>
    <a class="card" href="https://kotta-www-url.github.io/roulette/" target="_blank">Roulette</a>
    <a class="card" href="hhttps://kotta-www-url.github.io/EChecker/" target="_blank">EChecker</a>
    <a class="card" href="https://https://github.co.jp/" target="_blank">Github</a>
  </div>

  <div class="calc-container">
    <input type="text" id="display" class="calc-display" readonly placeholder="0">
    <div class="calc-buttons">
      <button class="calc-btn clear" onclick="clearDisplay()">C</button>
      <button class="calc-btn" onclick="backspace()">←</button>
      <button class="calc-btn" onclick="appendValue('(')">(</button>
      <button class="calc-btn" onclick="appendValue(')')">)</button>

      <button class="calc-btn" onclick="appendValue('x')">x</button>
      <button class="calc-btn" onclick="appendValue('=')">=</button>
      <button class="calc-btn" onclick="appendValue('^')">^</button>
      <button class="calc-btn" onclick="appendValue('÷')">÷</button>

      <button class="calc-btn num" onclick="appendValue('7')">7</button>
      <button class="calc-btn num" onclick="appendValue('8')">8</button>
      <button class="calc-btn num" onclick="appendValue('9')">9</button>
      <button class="calc-btn" onclick="appendValue('×')">×</button>

      <button class="calc-btn num" onclick="appendValue('4')">4</button>
      <button class="calc-btn num" onclick="appendValue('5')">5</button>
      <button class="calc-btn num" onclick="appendValue('6')">6</button>
      <button class="calc-btn" onclick="appendValue('-')">-</button>

      <button class="calc-btn num" onclick="appendValue('1')">1</button>
      <button class="calc-btn num" onclick="appendValue('2')">2</button>
      <button class="calc-btn num" onclick="appendValue('3')">3</button>
      <button class="calc-btn" onclick="appendValue('+')">+</button>

      <button class="calc-btn num" onclick="appendValue('0')">0</button>
      <button class="calc-btn num" onclick="appendValue('00')">00</button>
      <button class="calc-btn num" onclick="appendValue('.')">.</button>
      <button class="calc-btn exec" onclick="calculate()">計算</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');

    // 画面に文字を追加
    function appendValue(value) {
      if (display.value === 'Error' || display.value.startsWith('x = ') || display.value === '解なし' || display.value.includes('Error')) {
        display.value = '';
      }
      display.value += value;
    }

    // 画面をクリア
    function clearDisplay() {
      display.value = '';
    }

    // 1文字削除
    function backspace() {
      if (display.value === 'Error' || display.value.startsWith('x = ') || display.value === '解なし') {
        display.value = '';
      } else {
        display.value = display.value.slice(0, -1);
      }
    }

    // 計算・方程式の実行
    function calculate() {
      if (typeof nerdamer === 'undefined') {
        display.value = 'Network Error';
        return;
      }

      try {
        let expression = display.value;
        if (expression.trim() === '') return;

        // 記号の変換
        let calcExpression = expression.replace(/×/g, '*').replace(/÷/g, '/');

        // 省略された掛け算（*）を自動補完
        calcExpression = calcExpression
          .replace(/(\d)\(/g, '$1*(')
          .replace(/\)(\d)/g, ')*$1')
          .replace(/\)\(/g, ')*(')
          .replace(/(\d)x/g, '$1*x')
          .replace(/x\(/g, 'x*(')
          .replace(/\)x/g, ')*x')
          .replace(/x(\d)/g, 'x*$1')
          .replace(/xx/g, 'x*x');

        // 方程式（= が含まれている場合）の処理
        if (calcExpression.includes('=')) {
          let solutions = nerdamer.solveEquations(calcExpression, 'x');
          
          if (Array.isArray(solutions)) {
            if (solutions.length === 0) {
              display.value = "解なし";
            } else {
              let decimalSolutions = solutions.map(s => {
                // ライブラリの内部関数で安全に小数（decimal）テキストに変換
                let dec = nerdamer(s).text('decimal');
                let num = Number(dec);
                return isNaN(num) ? dec : num;
              });
              decimalSolutions = [...new Set(decimalSolutions)];
              display.value = "x = " + decimalSolutions.join(", ");
            }
          } else {
            let dec = nerdamer(solutions).text('decimal');
            let num = Number(dec);
            display.value = "x = " + (isNaN(num) ? dec : num);
          }
        } else {
          // 通常の計算
          if (calcExpression.includes('x')) {
            display.value = 'Error (=が必要)';
            return;
          }
          let dec = nerdamer(calcExpression).text('decimal');
          let num = Number(dec);
          display.value = isNaN(num) ? dec : num;
        }
      } catch (error) {
        display.value = 'Error';
      }
    }
  </script>
</body>
</html>
